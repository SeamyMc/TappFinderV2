services:
  - type: web
    name: tappfinder
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn tappfinder.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: tappfinder-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: tappfinder-db
    plan: free
    databaseName: tappfinder
    user: tappfinder
