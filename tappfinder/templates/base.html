<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TappFinder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #111008;
            font-family: 'Inter', system-ui, sans-serif;
            color: #f0e8d4;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(234,155,0,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Navbar ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 56px;
            background: rgba(17, 16, 8, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(234,155,0,0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
        }

        .nav-brand-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ea9b00, #c47200);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .nav-brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: #f0e8d4;
            letter-spacing: -0.01em;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            border-radius: 7px;
            font-size: 0.83rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            border: none;
        }

        .nav-btn-ghost {
            background: transparent;
            color: #a08060;
        }

        .nav-btn-ghost:hover {
            background: rgba(234,155,0,0.08);
            color: #f0e8d4;
        }

        .nav-btn-outline {
            background: transparent;
            color: #ea9b00;
            border: 1px solid rgba(234,155,0,0.3);
        }

        .nav-btn-outline:hover {
            background: rgba(234,155,0,0.08);
            border-color: rgba(234,155,0,0.6);
        }

        /* ── Page content ── */
        main {
            position: relative;
            z-index: 1;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="nav-brand">
            <div class="nav-brand-icon">🍺</div>
            <span class="nav-brand-name">TappFinder</span>
        </a>

        <a href="{% url 'map' %}" class="nav-btn nav-btn-ghost">Map</a>
        <a href="{% url 'search' %}" class="nav-btn nav-btn-ghost">Search</a>

        <div class="nav-actions">
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="nav-btn nav-btn-ghost">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    {{ user.username }}
                </a>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn nav-btn-outline">Sign out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-btn nav-btn-outline">Sign in</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
